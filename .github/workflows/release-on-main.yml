name: Publish Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect release-surface changes
        id: changed
        shell: bash
        run: |
          before="${{ github.event.before }}"

          if [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$before" "$GITHUB_SHA")"

          if printf '%s\n' "$changed_files" | grep -Eq '^(package\.json|runtime/package\.json|loop/package\.json|CHANGELOG\.md)$'; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release metadata from merged versions
        if: steps.changed.outputs.should_release == 'true'
        id: meta
        shell: bash
        run: |
          root_version="$(node -p "require('./package.json').version")"
          runtime_version="$(node -p "require('./runtime/package.json').version")"
          loop_version="$(node -p "require('./loop/package.json').version")"

          if [ "$root_version" != "$runtime_version" ]; then
            echo "Root version ($root_version) and runtime version ($runtime_version) must match for a GitHub release." >&2
            exit 1
          fi

          tag="v${root_version}"
          notes_file="$(mktemp)"

          changelog_section="$(awk -v version="$root_version" '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md)"

          if [ -z "$changelog_section" ]; then
            changelog_section="No matching CHANGELOG section found for ${root_version}."
          fi

          {
            printf '## Versions\n'
            printf -- '- `odin-workflow`: `%s`\n' "$root_version"
            printf -- '- `@plazmodium/odin`: `%s`\n' "$runtime_version"
            printf -- '- `ralph-loop`: `%s`\n\n' "$loop_version"
            printf '%s\n' "$changelog_section"
          } > "$notes_file"

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release_name=$tag" >> "$GITHUB_OUTPUT"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: steps.changed.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.meta.outputs.tag }}"
          release_name="${{ steps.meta.outputs.release_name }}"
          notes_file="${{ steps.meta.outputs.notes_file }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$release_name" --notes-file "$notes_file" --latest
          else
            gh release create "$tag" --target "$GITHUB_SHA" --title "$release_name" --notes-file "$notes_file" --latest
          fi
