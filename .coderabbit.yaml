# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

# General settings
language: "en-US"
early_access: false

reviews:
  # Review style: "chill" (lighter, friendly) or "assertive" (more thorough)
  profile: "assertive"

  # Automatically approve once comments are resolved (useful for OSS)
  request_changes_workflow: false

  # High-level summary in PR description + walkthrough
  high_level_summary: true
  high_level_summary_in_walkthrough: true

  # Extra nice-to-haves for OSS visibility
  poem: true
  review_status: true
  review_details: false
  collapse_walkthrough: true

  # Changed files, effort estimate, related issues/PRs
  changed_files_summary: true
  estimate_code_review_effort: true
  assess_linked_issues: true

  # Auto-review configuration
  auto_review:
    enabled: true
    drafts: false                    # Skip draft PRs (change to true if you want early feedback)
    auto_incremental_review: true    # Re-review on new pushes (incremental)
    auto_pause_after_reviewed_commits: 8  # Pause after this many commits to avoid spam

    # Review PRs targeting these base branches (regex patterns)
    # This covers main, dev, and any feature/* branches
    base_branches:
      - "main"
      - "master"
      - "dev"
      - "develop"
      - "feature/.*"
      - "feat/.*"
      - ".*"                         # Catch-all for everything else (remove if too broad)

    # Ignore noisy PRs
    ignore_title_keywords:
      - "WIP"
      - "Work in Progress"
      - "DO NOT MERGE"
      - "[skip review]"

    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "github-actions[bot]"

# Optional: Path-specific instructions (customize to your project)
# path_instructions:
